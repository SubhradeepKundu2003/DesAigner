spring:
  application:
    name: contentGenerator

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/contentgenerator}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

  # Local Ollama — no API key, nothing leaves the machine. Swap provider later by
  # replacing the Spring AI starter + this block; app code depends only on LlmClient.
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        # Don't auto-pull models at startup; assume `ollama pull` was run already.
        pull-model-strategy: never
      chat:
        # qwen3.5 is a reasoning model; thinking + JSON output was ~6x slower
        # (148s vs 24s per doc) with no quality gain for extraction, so disable it.
        think: false
        options:
          model: ${OLLAMA_CHAT_MODEL:qwen3.5:4b}
          temperature: 0.2
          # Explicit context window. Ollama's default (~4K tokens) silently
          # truncates long prompts — observed live as a huge docx collapsing to a
          # single extracted item. Chunking (app.understanding) keeps prompts
          # within this budget.
          num-ctx: 8192
      embedding:
        options:
          model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}

app:
  storage:
    root: ./storage
  understanding:
    # Documents are analyzed one chunk at a time; ~12K chars ≈ 3K tokens, which
    # plus prompts and the model's reply stays inside num-ctx above.
    max-chunk-chars: 12000
    # Safety valve for pathological documents; chunks beyond this are skipped
    # with a warning.
    max-chunks-per-document: 40
  planning:
    # Items scoring below min-score are deferred (not published this issue).
    min-score: 4
    # Each newsletter section keeps at most this many items; overflow is deferred.
    max-items-per-section: 5
  validation:
    # Export stays blocked while any unresolved flag at/above this severity exists.
    blocking-severity: high
    # Cap on source-material characters fed to one fact-check prompt, so the
    # prompt (source + article) stays inside num-ctx above.
    max-source-chars: 6000
  compliance:
    # The brand rulebook (agent #6). Editors tune these lists, not code.
    # All matching is whole-word; terminology and banned-phrases match any
    # casing, proper-names flag any casing other than the one written here.
    rules:
      # Banned term -> approved replacement (deterministic, case-preserving fix).
      terminology:
        "[e-mail]": email
        "[utilize]": use
        "[utilise]": use
        "[in order to]": to
        "[work force]": workforce
        "[client-facing]": customer-facing
      # Canonical spellings of brand/product names; wrong casing is corrected.
      proper-names:
        - TD Monthly
        - PowerPoint
        - PostgreSQL
        - SharePoint
      # Buzzwords with no drop-in replacement; an article containing one gets a
      # single LLM rewrite (kept only if the wording is gone and no figures changed).
      banned-phrases:
        - synergy
        - synergies
        - best-in-class
        - world-class
        - cutting-edge
        - game-changer
        - low-hanging fruit
        - paradigm shift
  design:
    # Active design template (resources/design-templates/<name>.json).
    # Available: tcs-brand (default), td-classic, noir-luxe (dark, extracted
    # from the reference PDFs by style extraction).
    template: tcs-brand
  graphics:
    # Approved brand images, one file per section under
    # storage/<brand-assets-root>/<NEWSLETTER_SECTION_NAME>/, with a GENERIC/
    # folder as the catch-all fallback. No config/code change needed to add one.
    brand-assets-root: assets
  style-extraction:
    # Design references (PDFs) the system learns visual style from — staged
    # under storage/<references-root>/, never embedded in output. Extracted
    # draft templates are written to storage/<output-dir>/ for human review;
    # copy a draft into resources/design-templates/ to activate it.
    references-root: references
    output-dir: references/extracted
    # Rasterization budget: pages render with their longest side at most
    # max-image-px pixels (very tall scroll-style pages are rendered at full
    # width and sliced instead), at most max-images-per-document images per
    # reference PDF — each image is one vision LLM call, minutes on CPU.
    max-image-px: 1024
    max-images-per-document: 3
  review:
    # WCAG-style text/background contrast ratio a text box must meet or exceed.
    contrast-ratio-threshold: 4.5
    # Slack allowed before a frame outside the page margins is flagged.
    margin-tolerance-pt: 1.0
    # Slack allowed before estimated text height exceeding its frame is flagged.
    overflow-tolerance-pt: 4.0
server:
  port: 8090
  error:
    # Surface exception messages on the error page (dev convenience; tighten for prod).
    include-message: always