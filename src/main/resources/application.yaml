spring:
  application:
    name: contentGenerator

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/contentgenerator}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

app:
  storage:
    root: ./storage
server:
  port: 8090